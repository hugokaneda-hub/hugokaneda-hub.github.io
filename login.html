<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Gavião Concurseiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --surface: #0d1420;
    --border: rgba(255,255,255,0.07);
    --blue: #2563eb;
    --blue-light: #3b82f6;
    --amber: #f59e0b;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --error: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  .orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
  .orb1 { width: 500px; height: 500px; background: rgba(37,99,235,0.12); top: -150px; right: -150px; }
  .orb2 { width: 350px; height: 350px; background: rgba(245,158,11,0.06); bottom: -100px; left: -100px; }

  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
    padding: 24px;
  }

  .logo-wrap {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 36px;
    animation: fadeDown 0.5s ease both;
  }

  .logo-icon {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 24px rgba(37,99,235,0.4);
  }

  .logo-text h1 { font-size: 1.3rem; font-weight: 800; }
  .logo-text span { font-size: 0.75rem; color: var(--amber); font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }

  .card {
    background: linear-gradient(145deg, rgba(13,20,32,0.95), rgba(17,24,39,0.9));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    backdrop-filter: blur(16px);
    box-shadow: 0 24px 64px rgba(0,0,0,0.45);
    animation: fadeUp 0.5s 0.1s ease both;
  }

  .card-header { margin-bottom: 28px; }
  .card-header h2 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 6px; }
  .card-header p { font-size: 0.85rem; color: var(--muted); }

  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .input-wrap { position: relative; }
  .input-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: rgba(148,163,184,0.5);
  }

  input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: rgba(37,99,235,0.5);
    background: rgba(37,99,235,0.05);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  }
  input::placeholder { color: rgba(148,163,184,0.35); }

  .toggle-pass {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: rgba(148,163,184,0.5); padding: 4px;
    transition: color 0.2s;
  }
  .toggle-pass:hover { color: var(--muted); }

  .btn-login {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(37,99,235,0.3);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(37,99,235,0.45); }
  .btn-login:active { transform: scale(0.98); }

  .btn-login .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  .btn-login.loading .spinner { display: block; }
  .btn-login.loading .btn-text { display: none; }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0;
    color: rgba(148,163,184,0.3); font-size: 0.75rem;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: rgba(255,255,255,0.07);
  }

  .back-link {
    display: block; text-align: center;
    font-size: 0.8rem; color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--text); }

  .footer-text {
    text-align: center;
    margin-top: 24px;
    font-size: 0.72rem;
    color: rgba(148,163,184,0.4);
  }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: none; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 11l-5 2 3 1-3 3 5-1-1 3 4-3 4 3-1-3 5 1-3-3 3-1-5-2-2-3-2 3z" fill="white" opacity="0.9"/>
        <path d="M16 4l-2 8 2 2 2-2L16 4z" fill="rgba(147,197,253,0.9)"/>
      </svg>
    </div>
    <div class="logo-text">
      <h1>Gavião Concurseiro</h1>
      <span>Área do Aluno</span>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Entrar na plataforma</h2>
      <p>Use as credenciais fornecidas no seu acesso.</p>
    </div>

    <div class="field">
      <label>Usuário</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>
        </svg>
        <input type="text" id="user" placeholder="Digite seu usuário" autocomplete="username">
      </div>
    </div>

    <div class="field">
      <label>Senha</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="pass" placeholder="Digite sua senha" autocomplete="current-password">
        <button class="toggle-pass" onclick="togglePass()" type="button" id="toggleBtn">
          <svg id="eyeIcon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span class="btn-text">Entrar</span>
      <div class="spinner"></div>
    </button>

    <div class="divider">ou</div>

    <a href="acesso.html" class="back-link">← Ver minhas credenciais de acesso</a>
  </div>

  <p class="footer-text">© 2026 Gavião Concurseiro · Acesso individual</p>
</div>

<script>
  function togglePass() {
    const p = document.getElementById('pass');
    p.type = p.type === 'password' ? 'text' : 'password';
  }

  function doLogin() {
    const btn = document.getElementById('loginBtn');
    btn.classList.add('loading');
    setTimeout(() => {
      localStorage.setItem('gc_logged', '1');
      localStorage.setItem('gc_login_time', Date.now());
      window.location.href = 'index.html';
    }, 800);
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
