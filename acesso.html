<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso Liberado – Gavião Concurseiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --surface: #0d1420;
    --surface2: #111827;
    --border: rgba(255,255,255,0.07);
    --blue: #2563eb;
    --blue-light: #3b82f6;
    --blue-glow: rgba(37,99,235,0.25);
    --amber: #f59e0b;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --success: #10b981;
    --orange: #f97316;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.5;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 400px; height: 400px; background: rgba(37,99,235,0.15); top: -100px; left: -100px; }
  .orb2 { width: 300px; height: 300px; background: rgba(249,115,22,0.08); bottom: -50px; right: -50px; }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 24px;
    text-align: center;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }

  .logo-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(37,99,235,0.4);
  }

  .logo-text h1 { font-size: 1.4rem; font-weight: 800; }
  .logo-text span { font-size: 0.8rem; color: var(--amber); }

  .card {
    background: linear-gradient(135deg, rgba(13,20,32,0.9), rgba(17,24,39,0.9));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 32px;
    backdrop-filter: blur(12px);
    animation: fadeUp 0.6s 0.15s ease both;
  }

  .badge {
    display: inline-flex;
    background: rgba(16,185,129,0.12);
    border: 1px solid rgba(16,185,129,0.25);
    color: var(--success);
    font-size: 0.75rem;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  h2 { font-size: 1.8rem; margin-bottom: 12px; }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 32px;
  }

  .credentials-box {
    background: rgba(37,99,235,0.06);
    border: 1px solid rgba(37,99,235,0.2);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: left;
  }

  .cred-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
  }

  .cred-value {
    font-family: monospace;
    background: rgba(255,255,255,0.05);
    padding: 4px 10px;
    border-radius: 6px;
  }

  .copy-btn {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: var(--blue);
    color: white;
    cursor: pointer;
  }

  .btn-main {
    display: block;
    margin-top: 20px;
    padding: 15px;
    background: var(--blue);
    color: white;
    border-radius: 12px;
    text-decoration: none;
  }

  .footer-text {
    margin-top: 24px;
    font-size: 0.75rem;
    color: rgba(148,163,184,0.5);
  }
</style>
</head>
<body>

<div class="container">
  <div class="card">

    <h2>Sua plataforma está pronta!</h2>

    <div class="credentials-box" id="credBox">
      <div class="cred-row">
        <span>Usuário</span>
        <span class="cred-value" id="user">aluno</span>
      </div>
      <div class="cred-row">
        <span>Senha</span>
        <span class="cred-value" id="pass">aprovado2026</span>
      </div>

      <button class="copy-btn" onclick="copiar()">Copiar credenciais</button>
    </div>

    <a href="login.html" target="_blank" class="btn-main">
      Acessar Plataforma
    </a>

  </div>

  <p class="footer-text">© 2026 Gavião Concurseiro</p>
</div>

<script>
function copiar() {
  const user = document.getElementById("user").innerText;
  const pass = document.getElementById("pass").innerText;

  navigator.clipboard.writeText(`Usuário: ${user} | Senha: ${pass}`);
  alert("Credenciais copiadas!");
}
</script>

</body>
</html>
